services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fintechhub
      POSTGRES_USER: fintechhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintechhub_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintechhub -d fintechhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: prod
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - prod_static:/app/staticfiles
      - prod_media:/app/media
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-before-production}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      DATABASE_URL: postgres://fintechhub:${POSTGRES_PASSWORD:-fintechhub_password}@db:5432/fintechhub

volumes:
  postgres_data:
  prod_static:
  prod_media:
